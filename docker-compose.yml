services:
  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "18000:8000"
    volumes:
      - .:/app
      - ${HOME}/.searchi:/searchi_data
      - ${HOME}/.searchi/model_cache:/root/.cache
      - /Users:/Users:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      SEARCHY_DATA_DIR: /searchi_data
      SEARCHY_APP_DB_PATH: /searchi_data/app_data/searchy_app.sqlite3
      SEARCHY_SOURCE_DB_DIR: /searchi_data/source_dbs
      SEARCHY_ALLOWED_SOURCE_ROOT: /Users
      SEARCHY_VECTOR_MODEL: sentence-transformers/all-MiniLM-L6-v2
      SEARCHY_ENABLE_VECTOR_RETRIEVAL: "1"
      SEARCHY_RERANKER_URL: http://reranker:8010
      SEARCHY_STATUS_TOKEN: searchi-local-status
      SEARCHY_ENABLE_RERANKER: "1"
      SEARCHY_SUMMARIZER_URL: http://summariser:8020
      HF_HOME: /root/.cache/huggingface
    depends_on:
      reranker:
        condition: service_started
      summariser:
        condition: service_healthy

  parser:
    build: .
    command: python -m app.worker.runner
    restart: on-failure
    volumes:
      - .:/app
      - ${HOME}/.searchi:/searchi_data
      - ${HOME}/.searchi/model_cache:/root/.cache
      - /Users:/Users:ro
    environment:
      SEARCHY_DATA_DIR: /searchi_data
      SEARCHY_APP_DB_PATH: /searchi_data/app_data/searchy_app.sqlite3
      SEARCHY_SOURCE_DB_DIR: /searchi_data/source_dbs
      SEARCHY_ALLOWED_SOURCE_ROOT: /Users
      SEARCHY_VECTOR_MODEL: sentence-transformers/all-MiniLM-L6-v2
      SEARCHY_ENABLE_VECTOR_RETRIEVAL: "1"
      SEARCHY_STATUS_TOKEN: searchi-local-status
      SEARCHY_POLL_SECONDS: "3"
      HF_HOME: /root/.cache/huggingface
    deploy:
      replicas: 1
      labels:
        - "searchi.service=parser"
        - "searchi.model=docling"
      resources:
        limits:
          memory: 24G
        reservations:
          memory: 1G
    depends_on:
      summariser:
        condition: service_healthy

  reranker:
    build: .
    labels:
      - "searchi.service=reranker"
      - "searchi.model=cross-encoder/ms-marco-MiniLM-L4-v2"
    command: uvicorn app.reranker_api:app --host 0.0.0.0 --port 8010 --reload
    volumes:
      - .:/app
      - ${HOME}/.searchi:/searchi_data
      - ${HOME}/.searchi/model_cache:/root/.cache
    environment:
      SEARCHY_ENABLE_RERANKER: "0"
      SEARCHY_STATUS_TOKEN: searchi-local-status
      SEARCHY_RERANKER_MODEL: cross-encoder/ms-marco-MiniLM-L4-v2
      SEARCHY_RERANKER_BATCH_SIZE: "16"
      HF_HOME: /root/.cache/huggingface

  summariser:
    build: .
    command: uvicorn app.summarizer_api:app --host 0.0.0.0 --port 8020
    labels:
      - "searchi.service=summariser"
      - "searchi.model=Falconsai/text_summarization"
    ports:
      - "11435:8020"
    volumes:
      - .:/app
      - ${HOME}/.searchi/model_cache:/root/.cache
    environment:
      HF_HOME: /root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
