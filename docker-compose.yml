services:
  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "18000:8000"
    volumes:
      - .:/app
      - ${HOME}/.searchi:/searchi_data
      - ${HOME}/.searchi/model_cache:/root/.cache
      - /Users:/Users:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      SEARCHY_DATA_DIR: /searchi_data
      SEARCHY_APP_DB_PATH: /searchi_data/app_data/searchy_app.sqlite3
      SEARCHY_SOURCE_DB_DIR: /searchi_data/source_dbs
      SEARCHY_ALLOWED_SOURCE_ROOT: /Users
      SEARCHY_VECTOR_MODEL: sentence-transformers/all-MiniLM-L6-v2
      SEARCHY_ENABLE_VECTOR_RETRIEVAL: "1"
      SEARCHY_RERANKER_URL: http://reranker:8010
      SEARCHY_STATUS_TOKEN: searchi-local-status
      SEARCHY_ENABLE_RERANKER: "1"
      SEARCHY_SUMMARIZER_URL: http://summariser:11434
      HF_HOME: /root/.cache/huggingface
    depends_on:
      reranker:
        condition: service_started
      summariser:
        condition: service_healthy

  worker:
    build: .
    command: python -m app.worker.runner
    restart: on-failure
    volumes:
      - .:/app
      - ${HOME}/.searchi:/searchi_data
      - ${HOME}/.searchi/model_cache:/root/.cache
      - /Users:/Users:ro
    environment:
      SEARCHY_DATA_DIR: /searchi_data
      SEARCHY_APP_DB_PATH: /searchi_data/app_data/searchy_app.sqlite3
      SEARCHY_SOURCE_DB_DIR: /searchi_data/source_dbs
      SEARCHY_ALLOWED_SOURCE_ROOT: /Users
      SEARCHY_VECTOR_MODEL: sentence-transformers/all-MiniLM-L6-v2
      SEARCHY_ENABLE_VECTOR_RETRIEVAL: "1"
      SEARCHY_STATUS_TOKEN: searchi-local-status
      SEARCHY_POLL_SECONDS: "3"
      HF_HOME: /root/.cache/huggingface
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    depends_on:
      summariser:
        condition: service_healthy

  reranker:
    build: .
    command: uvicorn app.reranker_api:app --host 0.0.0.0 --port 8010 --reload
    volumes:
      - .:/app
      - ${HOME}/.searchi:/searchi_data
    environment:
      SEARCHY_ENABLE_RERANKER: "0"
      SEARCHY_STATUS_TOKEN: searchi-local-status
      SEARCHY_RERANKER_MODEL: cross-encoder/ms-marco-MiniLM-L4-v2
      SEARCHY_RERANKER_BATCH_SIZE: "16"

  summariser:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ${HOME}/.searchi/ollama:/root/.ollama
      - ./scripts/init-ollama.sh:/init-ollama.sh
    entrypoint: ["/bin/sh", "/init-ollama.sh"]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
