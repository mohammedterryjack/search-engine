x-searchi-model-env: &searchi-model-env
  SEARCHY_SUMMARY_MODEL: ${SEARCHY_SUMMARY_MODEL}
  SEARCHY_AI_MODEL: ${SEARCHY_AI_MODEL}
  SEARCHY_SUMMARIZER_NUM_CTX: ${SEARCHY_SUMMARIZER_NUM_CTX}

x-searchi-app-env: &searchi-app-env
  SEARCHY_DATA_DIR: ${SEARCHY_DATA_DIR}
  SEARCHY_APP_DB_PATH: ${SEARCHY_APP_DB_PATH}
  SEARCHY_SOURCE_DB_DIR: ${SEARCHY_SOURCE_DB_DIR}
  SEARCHY_ALLOWED_SOURCE_ROOT: ${SEARCHY_ALLOWED_SOURCE_ROOT}
  SEARCHY_VECTOR_MODEL: ${SEARCHY_VECTOR_MODEL}
  SEARCHY_ENABLE_VECTOR_RETRIEVAL: ${SEARCHY_ENABLE_VECTOR_RETRIEVAL}
  SEARCHY_VECTOR_MIN_SCORE_DEFAULT: ${SEARCHY_VECTOR_MIN_SCORE_DEFAULT}
  SEARCHY_RERANKER_URL: ${SEARCHY_RERANKER_URL}
  SEARCHY_RERANKER_TIMEOUT: ${SEARCHY_RERANKER_TIMEOUT}
  SEARCHY_STATUS_TOKEN: ${SEARCHY_STATUS_TOKEN}
  SEARCHY_ENABLE_RERANKER: ${SEARCHY_ENABLE_RERANKER}
  SEARCHY_POLL_SECONDS: ${SEARCHY_POLL_SECONDS}
  SEARCHY_ENABLE_SUMMARIZER: ${SEARCHY_ENABLE_SUMMARIZER}
  SEARCHY_SUMMARIZER_URL: ${SEARCHY_SUMMARIZER_URL}
  SEARCHY_SUMMARIZER_TIMEOUT: ${SEARCHY_SUMMARIZER_TIMEOUT}
  SEARCHY_AI_SOURCE_LIMIT: ${SEARCHY_AI_SOURCE_LIMIT}

services:
  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "18000:8000"
    volumes:
      - .:/app
      - ${HOME}/.searchi:/searchi_data
      - ${HOME}/.searchi/model_cache:/root/.cache
      - /Users:/Users:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      <<: [*searchi-app-env, *searchi-model-env]
      HF_HOME: ${HF_HOME}
    depends_on:
      reranker:
        condition: service_started
      summariser:
        condition: service_healthy

  parser:
    build: .
    command: python -m app.worker.runner
    restart: on-failure
    volumes:
      - .:/app
      - ${HOME}/.searchi:/searchi_data
      - ${HOME}/.searchi/model_cache:/root/.cache
      - /Users:/Users:ro
    environment:
      <<: [*searchi-app-env, *searchi-model-env]
      HF_HOME: ${HF_HOME}
    deploy:
      replicas: 1
      labels:
        - "searchi.service=parser"
        - "searchi.model=docling"
      resources:
        limits:
          memory: 32G
        reservations:
          memory: 2G
    depends_on:
      summariser:
        condition: service_healthy

  reranker:
    build: .
    labels:
      - "searchi.service=reranker"
      - "searchi.model=cross-encoder/ms-marco-MiniLM-L4-v2"
    command: uvicorn app.reranker_api:app --host 0.0.0.0 --port 8010 --reload
    volumes:
      - .:/app
      - ${HOME}/.searchi:/searchi_data
      - ${HOME}/.searchi/model_cache:/root/.cache
    environment:
      SEARCHY_ENABLE_RERANKER: "0"
      SEARCHY_STATUS_TOKEN: ${SEARCHY_STATUS_TOKEN}
      SEARCHY_RERANKER_MODEL: ${SEARCHY_RERANKER_MODEL}
      SEARCHY_RERANKER_BATCH_SIZE: ${SEARCHY_RERANKER_BATCH_SIZE}
      HF_HOME: ${HF_HOME}

  summariser:
    build: .
    command: uvicorn app.summarizer_api:app --host 0.0.0.0 --port 8020
    labels:
      - "searchi.service=summariser"
      - "searchi.model=summary=${SEARCHY_SUMMARY_MODEL},answer=${SEARCHY_AI_MODEL}"
    ports:
      - "11435:8020"
    volumes:
      - .:/app
    environment:
      OLLAMA_URL: ${OLLAMA_URL}
      <<: *searchi-model-env
      SEARCHY_SUMMARIZER_TIMEOUT: ${SEARCHY_SUMMARIZER_TIMEOUT}
      SEARCHY_AI_SOURCE_LIMIT: ${SEARCHY_AI_SOURCE_LIMIT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
