[project]
name = "local-search-engine"
version = "0.1.0"
description = "Lightweight local search engine over configurable filesystem roots."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.11.0",
  "pydantic-settings>=2.10.0",
  "textual>=0.79.1",
  "watchfiles>=1.1.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/search_engine"]

[tool.uv]
package = true
